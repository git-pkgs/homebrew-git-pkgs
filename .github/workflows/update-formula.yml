name: Update Formula

on:
  schedule:
    - cron: '0 9 * * *'  # Daily at 9am UTC
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        include:
          - name: git-pkgs
            repo: git-pkgs/git-pkgs
            formula: Formula/git-pkgs.rb
          - name: proxy
            repo: git-pkgs/proxy
            formula: Formula/proxy.rb
          - name: forge
            repo: git-pkgs/forge
            formula: Formula/forge.rb
          - name: brief
            repo: git-pkgs/brief
            formula: Formula/brief.rb
          - name: pom
            repo: git-pkgs/pom
            formula: Formula/pom.rb
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false

      - name: Check for new release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ matrix.repo }}
          FORMULA: ${{ matrix.formula }}
        run: |
          LATEST=$(gh api "repos/${REPO}/releases/latest" --jq '.tag_name' | sed 's/^v//')
          CURRENT=$(grep -m1 'version "' "$FORMULA" | sed 's/.*version "\([^"]*\)".*/\1/')

          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "current=$CURRENT" >> $GITHUB_OUTPUT

          if [ "$LATEST" != "$CURRENT" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "New version available: $LATEST (current: $CURRENT)"
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "Already up to date: $CURRENT"
          fi

      - name: Update formula
        if: steps.check.outputs.needs_update == 'true'
        env:
          VERSION: ${{ steps.check.outputs.latest }}
          REPO: ${{ matrix.repo }}
          FORMULA: ${{ matrix.formula }}
        run: |
          # Download checksums
          curl -sL "https://github.com/${REPO}/releases/download/v${VERSION}/checksums.txt" -o checksums.txt

          # Extract SHA256 for each platform
          SHA_DARWIN_AMD64=$(grep 'darwin_amd64' checksums.txt | awk '{print $1}')
          SHA_DARWIN_ARM64=$(grep 'darwin_arm64' checksums.txt | awk '{print $1}')
          SHA_LINUX_AMD64=$(grep 'linux_amd64' checksums.txt | awk '{print $1}')
          SHA_LINUX_ARM64=$(grep 'linux_arm64' checksums.txt | awk '{print $1}')

          # Update formula - use awk to match sha256 lines by their preceding url context
          awk -v ver="$VERSION" \
              -v sha_da="$SHA_DARWIN_AMD64" -v sha_darm="$SHA_DARWIN_ARM64" \
              -v sha_la="$SHA_LINUX_AMD64" -v sha_larm="$SHA_LINUX_ARM64" '
            /version "/ { gsub(/"[^"]*"/, "\"" ver "\"") }
            /darwin_amd64\.tar\.gz/ { url_type = "darwin_amd64" }
            /darwin_arm64\.tar\.gz/ { url_type = "darwin_arm64" }
            /linux_amd64\.tar\.gz/ { url_type = "linux_amd64" }
            /linux_arm64\.tar\.gz/ { url_type = "linux_arm64" }
            /sha256 "/ {
              if (url_type == "darwin_amd64") gsub(/"[a-f0-9]+"/, "\"" sha_da "\"")
              else if (url_type == "darwin_arm64") gsub(/"[a-f0-9]+"/, "\"" sha_darm "\"")
              else if (url_type == "linux_amd64") gsub(/"[a-f0-9]+"/, "\"" sha_la "\"")
              else if (url_type == "linux_arm64") gsub(/"[a-f0-9]+"/, "\"" sha_larm "\"")
              url_type = ""
            }
            { print }
          ' "$FORMULA" > "$FORMULA.tmp" && mv "$FORMULA.tmp" "$FORMULA"

      - name: Commit and push
        if: steps.check.outputs.needs_update == 'true'
        env:
          VERSION: ${{ steps.check.outputs.latest }}
          GH_TOKEN: ${{ github.token }}
          NAME: ${{ matrix.name }}
          FORMULA: ${{ matrix.formula }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FORMULA"
          git commit -m "Update ${NAME} to v${VERSION}"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git pull --rebase origin main
          git push
